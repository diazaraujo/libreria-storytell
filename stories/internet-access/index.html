<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Internet Access — Chapter scroll (Atlas replica)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/chapter-scroll.css" />
  <style>
    body { margin: 0; background: #fff; }
    body.ch-story-page { --ch-sticky-top: 0px; }
    .ch-topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 8px 16px;
      background: transparent; border-bottom: none;
      font: 600 12px/1.2 "Open Sans", system-ui, sans-serif; color: rgba(255,255,255,0.75);
    }
    .ch-topbar a { color: rgba(255,255,255,0.9); text-decoration: none; }
    .ch-topbar .tag {
      background: rgba(255,255,255,0.14); color: #fff;
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
    }
    .ch-end {
      max-width: 640px; margin: 0 auto; padding: 48px 24px 96px;
      color: rgba(255,255,255,0.75); font-size: 14px; line-height: 1.5;
    }
  </style>
</head>
<body class="ch-story-page">
  <div class="ch-topbar">
    <div>
      <a href="../../gallery-atlas.html">← Gallery</a>
      · <a href="../../gallery.html">Dev</a>
      · <span class="tag">internet · 10/10</span>
    </div>
    <div>
      <a href="http://127.0.0.1:8765/en/atlas/internet-access/" target="_blank">Origen</a>
      ·
      <a href="https://data360.worldbank.org/en/atlas/internet-access/" target="_blank">Live Atlas</a>
    </div>
  </div>

  <div id="story"></div>

  <div class="ch-end">
    <p>
      <strong>Internet story 10/10</strong> — trends · urban–rural · gender · progress · mobile/fixed ·
      coverage · speed · slopes · text · smartphone.
    </p>
  </div>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.css" rel="stylesheet" />
  <script src="../../shared/svg.js"></script>
  <script src="../../shared/load.js"></script>
  <script src="../../shared/country-names.js"></script>
  <script src="../../shared/particles.js"></script>
  <script src="../../shared/chapter-scroll.js"></script>
  <script src="../../library/access-trends-scroller/access-trends-scroller.js"></script>
  <script src="../../library/dual-line-urban-rural/dual-line-urban-rural.js"></script>
  <script src="../../library/progress-race/progress-race.js"></script>
  <script src="../../library/gender-gap-bars/gender-gap-bars.js"></script>
  <script src="../../library/mobile-fixed-broadband/mobile-fixed-broadband.js"></script>
  <script src="../../library/coverage-ranked-bars/coverage-ranked-bars.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.js"></script>
  <script src="../../library/nightlights-hexmap/mapbox-config.js"></script>
  <script src="../../library/coverage-choropleth-map/coverage-choropleth-map.js"></script>
  <script src="../../library/dual-speed-bars/dual-speed-bars.js"></script>
  <script src="../../library/slope-gap-chart/slope-gap-chart.js"></script>
  <script src="../../library/ranked-rate-bars/ranked-rate-bars.js"></script>
  <script>
    (async function () {
      const story = await (await fetch("./story.json")).json();
      const names = window.ATLAS_COUNTRY_NAMES || {};

      const [
        trendRows,
        urbanRuralRows,
        progressRaw,
        genderRows,
        mfGlobal,
        mfCountries,
        coverageRows,
        speedRows,
        slopeRows,
        textRows,
        phoneRows,
      ] = await Promise.all([
        AtlasLoad.csv("./data/09_data_internet_access.csv"),
        AtlasLoad.csv("./data/09_data_internet_access_urban_rural.csv"),
        AtlasLoad.csv("./data/09_data_internet_usage_progress.csv"),
        AtlasLoad.csv("./data/09_data_income_gender_gap.csv"),
        AtlasLoad.csv("./data/mobile_fixed_global.csv"),
        AtlasLoad.csv("./data/mobile_fixed_broadband_subscriptions.csv"),
        AtlasLoad.csv("./data/09_data_network_coverages.csv"),
        AtlasLoad.csv("./data/09_data_speedtest.csv"),
        AtlasLoad.csv("./data/09_data_coverage_access_gaps.csv"),
        AtlasLoad.csv("./data/09_data_can_send_text_message.csv"),
        AtlasLoad.csv("./data/09_data_lack_of_money.csv"),
      ]);

      const progressRows = progressRaw.map((r) => ({
        iso3c: r.iso3c,
        access_2015: r.internet_2015,
        access_2023: r.internet_2024,
      }));

      const wait2 = () =>
        new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

      const mounts = {
        "access-trends": async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasAccessTrendsScroller.mount(chartEl, {
            rows: trendRows,
            sceneIndex: ctx.sceneIndex || 0,
            forceRemount: true,
            height: h,
          });
        },
        "urban-rural-income": async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasDualLineUrbanRural.mount(chartEl, {
            rows: urbanRuralRows,
            variant: "income",
            forceRemount: true,
            height: h,
            labels: {
              urban: "Urban",
              rural: "Rural",
              y_axis_units: "% of population",
            },
          });
        },
        "gender-gap": async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasGenderGapBars.mount(chartEl, {
            rows: genderRows,
            height: h,
          });
        },
        progress: async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasProgressRace.mount(chartEl, {
            rows: progressRows,
            sceneIndex: ctx.sceneIndex || 0,
            names,
            focus: ["KHM", "KGZ", "ETH", "NGA", "IND"],
            forceRemount: true,
            height: h,
            labels: {
              progress_speed: "Speed of progress",
              regression: "regression",
              standstill: "standstill",
              slow: "slow",
              typical: "typical",
              fast: "fast",
              very_fast: "very fast",
              select_country: "Select economies to highlight",
            },
          });
        },
        "mobile-fixed": async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasMobileFixedBroadband.mount(chartEl, {
            globalRows: mfGlobal,
            countryRows: mfCountries,
            sceneIndex: ctx.sceneIndex || 0,
            names,
            forceRemount: true,
            height: h,
          });
        },
        coverage: async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          // Prefer real Mapbox choropleth; fall back to ranked bars
          try {
            if (window.mapboxgl && window.AtlasCoverageChoroplethMap && window.ATLAS_MAPBOX_TOKEN) {
              return AtlasCoverageChoroplethMap.mount(chartEl, {
                rows: coverageRows,
                sceneIndex: ctx.sceneIndex || 0,
                forceRemount: true,
                height: h,
              });
            }
          } catch (err) {
            console.warn("coverage map fallback", err);
          }
          return AtlasCoverageRankedBars.mount(chartEl, {
            rows: coverageRows,
            sceneIndex: ctx.sceneIndex || 0,
            names,
            forceRemount: true,
            height: h,
          });
        },
        speed: async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasDualSpeedBars.mount(chartEl, {
            rows: speedRows,
            names,
            height: h,
          });
        },
        slopes: async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasSlopeGapChart.mount(chartEl, {
            rows: slopeRows,
            names,
            height: h,
          });
        },
        "can-send-text": async (chartEl) => {
          await wait2();
          // tall chart for many countries
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasRankedRateBars.mount(chartEl, {
            rows: textRows,
            mode: "can-send",
            names,
            forceRemount: true,
            height: h,
          });
        },
        smartphone: async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasRankedRateBars.mount(chartEl, {
            rows: phoneRows,
            mode: "smartphone",
            sceneIndex: ctx.sceneIndex || 0,
            names,
            forceRemount: true,
            height: h,
          });
        },
      };

      for (const b of story.blocks) {
        if (mounts[b.id]) b.mount = mounts[b.id];
      }

      window.__chapter = AtlasChapterScroll.mount(
        document.getElementById("story"),
        story
      );
    })().catch((err) => {
      console.error(err);
      document.getElementById("story").innerHTML =
        `<div style="padding:40px;color:#aa0000"><strong>Story load error</strong><pre>${err}</pre></div>`;
    });
  </script>
</body>
</html>
