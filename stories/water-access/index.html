<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Access — Chapter scroll (Atlas replica)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/chapter-scroll.css" />
  <style>
    body { margin: 0; background: #fff; }
    body.ch-story-page { --ch-sticky-top: 0px; }
    .ch-topbar {
      position: relative; z-index: 5;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 8px 16px;
      background: #fff; border-bottom: 1px solid #e8eaef;
      font: 600 12px/1.2 "Open Sans", system-ui, sans-serif; color: #6a7781;
    }
    .ch-topbar a { color: #0071bc; text-decoration: none; }
    .ch-topbar .tag {
      background: #e0f2fe; color: #0369a1;
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
    }
    .ch-end {
      max-width: 640px; margin: 0 auto; padding: 48px 24px 96px;
      color: #6a7781; font-size: 14px; line-height: 1.5;
    }
  </style>
</head>
<body class="ch-story-page">
  <div class="ch-topbar">
    <div>
      <a href="../../gallery-atlas.html">← Gallery</a>
      · <a href="../../gallery.html">Dev</a>
      · <span class="tag">water · 6/11</span>
    </div>
    <div>
      <a href="http://127.0.0.1:8765/en/atlas/water-access/" target="_blank">Origen</a>
      ·
      <a href="https://data360.worldbank.org/en/atlas/water-access/" target="_blank">Live Atlas</a>
    </div>
  </div>

  <div id="story"></div>

  <div class="ch-end">
    <p>
      <strong>Water story 6/11</strong> — JMP ladder · urban–rural dual-line · country beeswarm ·
      component min bars · limiting factors · Tanzania / typical paths.
    </p>
  </div>

  <script src="../../shared/svg.js"></script>
  <script src="../../shared/load.js"></script>
  <script src="../../shared/beeswarm.js"></script>
  <script src="../../shared/components/BeeswarmChart.js"></script>
  <script src="../../shared/particles.js"></script>
  <script src="../../shared/chapter-scroll.js"></script>
  <script src="../../library/service-ladder-stack/service-ladder-stack.js"></script>
  <script src="../../library/dual-line-urban-rural/dual-line-urban-rural.js"></script>
  <script src="../../library/value-beeswarm/value-beeswarm.js"></script>
  <script src="../../library/component-min-bars/component-min-bars.js"></script>
  <script src="../../library/limiting-factors-bars/limiting-factors-bars.js"></script>
  <script src="../../library/component-paths/component-paths.js"></script>
  <script>
    (async function () {
      const story = await (await fetch("./story.json")).json();

      const [
        ladderRows,
        regionUR,
        countryRows,
        componentRows,
        limitingRows,
        tzRows,
        typicalRows,
      ] = await Promise.all([
        AtlasLoad.csv("./data/safely_managed.csv"),
        AtlasLoad.csv("./data/region_urban_rural.csv"),
        AtlasLoad.csv("./data/Country_SafelyManaged_2024.csv"),
        AtlasLoad.csv("./data/Indicator.csv"),
        AtlasLoad.csv("./data/limiting_factors.csv"),
        AtlasLoad.csv("./data/tanzania_drinking_water.csv"),
        AtlasLoad.csv("./data/drinking_water_typical_paths.csv"),
      ]);

      // dual-line expects iso3c, area (urban|rural), year, value
      const dualRows = regionUR
        .filter(
          (r) =>
            r.level === "safely_managed" &&
            (r.location === "urban" || r.location === "rural") &&
            r.value !== "" &&
            r.value != null
        )
        .map((r) => ({
          iso3c: r.region,
          area: r.location,
          year: r.year,
          value: r.value,
        }));

      const wait2 = () =>
        new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

      for (const b of story.blocks) {
        if (b.id === "safely-managed") {
          b.mount = async (chartEl, ctx) => {
            await wait2();
            const h = Math.min(520, Math.max(420, chartEl.clientHeight || 460));
            chartEl.style.cssText = `width:100%;height:${h}px`;
            return AtlasServiceLadderStack.mount(chartEl, {
              rows: ladderRows,
              sceneIndex: ctx.sceneIndex || 0,
              forceRemount: true,
              height: h,
            });
          };
        }
        if (b.id === "urban-rural") {
          b.mount = async (chartEl) => {
            await wait2();
            const h = Math.min(600, Math.max(520, chartEl.clientHeight || 560));
            chartEl.style.cssText = `width:100%;height:${h}px`;
            return AtlasDualLineUrbanRural.mount(chartEl, {
              rows: dualRows,
              variant: "regions",
              forceRemount: true,
              height: h,
              xDomain: [2000, 2024],
              xTicks: [2000, 2024],
              labels: {
                urban: "Urban",
                rural: "Rural",
                y_axis_units: "% of population",
              },
            });
          };
        }
        if (b.id === "country-beeswarm") {
          b.mount = async (chartEl, ctx) => {
            await wait2();
            const h = Math.min(560, Math.max(440, chartEl.clientHeight || 500));
            chartEl.style.cssText = `width:100%;height:${h}px`;
            return AtlasValueBeeswarm.mount(chartEl, {
              rows: countryRows.map((r) => ({
                iso3c: r.iso3,
                name: r.country_name,
                value: r.value,
              })),
              sceneIndex: ctx.sceneIndex || 0,
              forceRemount: true,
              height: h,
              universalThreshold: 99,
              lowThreshold: 50,
            });
          };
        }
        if (b.id === "estimating") {
          b.mount = async (chartEl, ctx) => {
            await wait2();
            const h = Math.min(440, Math.max(360, chartEl.clientHeight || 400));
            chartEl.style.cssText = `width:100%;height:${h}px`;
            return AtlasComponentMinBars.mount(chartEl, {
              rows: componentRows,
              sceneIndex: ctx.sceneIndex || 0,
              countries: ["Mongolia", "Nepal"],
              forceRemount: true,
              height: h,
            });
          };
        }
        if (b.id === "limiting") {
          b.mount = async (chartEl, ctx) => {
            await wait2();
            const h = Math.min(500, Math.max(420, chartEl.clientHeight || 460));
            chartEl.style.cssText = `width:100%;height:${h}px`;
            return AtlasLimitingFactorsBars.mount(chartEl, {
              rows: limitingRows,
              sceneIndex: ctx.sceneIndex || 0,
              forceRemount: true,
              height: h,
            });
          };
        }
        if (b.id === "tanzania") {
          b.mount = async (chartEl, ctx) => {
            await wait2();
            const h = Math.min(480, Math.max(400, chartEl.clientHeight || 440));
            chartEl.style.cssText = `width:100%;height:${h}px`;
            return AtlasComponentPaths.mount(chartEl, {
              rows: tzRows,
              typicalRows,
              sceneIndex: ctx.sceneIndex || 0,
              showTypicalFromScene: 2,
              forceRemount: true,
              height: h,
            });
          };
        }
      }

      window.__chapter = AtlasChapterScroll.mount(
        document.getElementById("story"),
        story
      );
    })().catch((err) => {
      console.error(err);
      document.getElementById("story").innerHTML =
        `<div style="padding:40px;color:#aa0000"><strong>Story load error</strong><pre>${err}</pre></div>`;
    });
  </script>
</body>
</html>
