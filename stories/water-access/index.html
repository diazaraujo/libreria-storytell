<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Access — Chapter scroll (Atlas replica)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/chapter-scroll.css" />
  <style>
    body { margin: 0; background: #fff; }
    body.ch-story-page { --ch-sticky-top: 0px; }
    .ch-topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 8px 16px;
      background: transparent; border-bottom: none;
      font: 600 12px/1.2 "Open Sans", system-ui, sans-serif; color: rgba(255,255,255,0.75);
    }
    .ch-topbar a { color: rgba(255,255,255,0.9); text-decoration: none; }
    .ch-topbar .tag {
      background: rgba(255,255,255,0.14); color: #fff;
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
    }
    .ch-end {
      max-width: 640px; margin: 0 auto; padding: 56px 24px 120px;
      color: #6a7781; font-size: 14px; line-height: 1.55;
      font-family: "Open Sans", system-ui, sans-serif;
    }
    .ch-end strong { color: #100e2b; }
  </style>
</head>
<body class="ch-story-page">
  <div class="ch-topbar">
    <div>
      <a href="../../gallery-atlas.html">← Gallery</a>
      · <a href="../../gallery.html">Dev</a>
      · <span class="tag">water · 11/11</span>
    </div>
    <div>
      <a href="http://127.0.0.1:8765/en/atlas/water-access/" target="_blank">Origen</a>
      ·
      <a href="https://data360.worldbank.org/en/atlas/water-access/" target="_blank">Live Atlas</a>
    </div>
  </div>

  <div id="story"></div>

  <div class="ch-end">
    <p>
      <strong>Water story 11/11</strong> — JMP ladder · urban–rural · beeswarm · components ·
      limiting factors · Tanzania · E. coli · arsenic.
    </p>
  </div>

  <script src="../../shared/svg.js"></script>
  <script src="../../shared/load.js"></script>
  <script src="../../shared/beeswarm.js"></script>
  <script src="../../shared/components/BeeswarmChart.js"></script>
  <script src="../../shared/particles.js"></script>
  <script src="../../shared/chapter-scroll.js"></script>
  <script src="../../library/service-ladder-stack/service-ladder-stack.js"></script>
  <script src="../../library/dual-line-urban-rural/dual-line-urban-rural.js"></script>
  <script src="../../library/value-beeswarm/value-beeswarm.js"></script>
  <script src="../../library/component-min-bars/component-min-bars.js"></script>
  <script src="../../library/limiting-factors-bars/limiting-factors-bars.js"></script>
  <script src="../../library/component-paths/component-paths.js"></script>
  <script src="../../library/risk-level-table/risk-level-table.js"></script>
  <script src="../../library/paired-compare-bars/paired-compare-bars.js"></script>
  <script src="../../library/urban-rural-bars/urban-rural-bars.js"></script>
  <script src="../../library/stacked-share-bars/stacked-share-bars.js"></script>
  <script src="../../library/dual-threshold-bars/dual-threshold-bars.js"></script>
  <script>
    (async function () {
      const story = await (await fetch("./story.json")).json();

      const [
        ladderRows,
        regionUR,
        countryRows,
        componentRows,
        limitingRows,
        tzRows,
        typicalRows,
        ecoliTable,
        ecoliPocPou,
        ecoliUR,
        arsenicGroup,
        arsenicSource,
      ] = await Promise.all([
        AtlasLoad.csv("./data/safely_managed.csv"),
        AtlasLoad.csv("./data/region_urban_rural.csv"),
        AtlasLoad.csv("./data/Country_SafelyManaged_2024.csv"),
        AtlasLoad.csv("./data/Indicator.csv"),
        AtlasLoad.csv("./data/limiting_factors.csv"),
        AtlasLoad.csv("./data/tanzania_drinking_water.csv"),
        AtlasLoad.csv("./data/drinking_water_typical_paths.csv"),
        AtlasLoad.csv("./data/ecoli_table.csv"),
        AtlasLoad.csv("./data/ecoli_poc_pou.csv"),
        AtlasLoad.csv("./data/ecoli_urban_rural.csv"),
        AtlasLoad.csv("./data/Bangladesh_arsenic_by_group.csv"),
        AtlasLoad.csv("./data/ArsenicBySource.csv"),
      ]);

      const dualRows = regionUR
        .filter(
          (r) =>
            r.level === "safely_managed" &&
            (r.location === "urban" || r.location === "rural") &&
            r.value !== "" &&
            r.value != null
        )
        .map((r) => ({
          iso3c: r.region,
          area: r.location,
          year: r.year,
          value: r.value,
        }));

      // pivot PoC / PoU long form → wide
      const pocPouBy = new Map();
      ecoliPocPou.forEach((r) => {
        if (!pocPouBy.has(r.country)) {
          pocPouBy.set(r.country, { label: r.country, a: null, b: null });
        }
        const o = pocPouBy.get(r.country);
        if (r.point === "PoC") o.a = +r.value;
        if (r.point === "PoU") o.b = +r.value;
      });
      const pocPouRows = [...pocPouBy.values()].filter(
        (d) => Number.isFinite(d.a) && Number.isFinite(d.b)
      );

      const wait2 = () =>
        new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

      const mounts = {
        "safely-managed": async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          // reuse → updateScene only (layer dim tween preserved)
          return AtlasServiceLadderStack.mount(chartEl, {
            rows: ladderRows,
            sceneIndex: ctx.sceneIndex || 0,
            forceRemount: false,
            reuse: true,
            height: h,
          });
        },
        "urban-rural": async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasDualLineUrbanRural.mount(chartEl, {
            rows: dualRows,
            variant: "regions",
            forceRemount: false,
            reuse: true,
            height: h,
            xDomain: [2000, 2024],
            xTicks: [2000, 2024],
            labels: {
              urban: "Urban",
              rural: "Rural",
              y_axis_units: "% of population",
            },
          });
        },
        "country-beeswarm": async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasValueBeeswarm.mount(chartEl, {
            rows: countryRows.map((r) => ({
              iso3c: r.iso3,
              name: r.country_name,
              value: r.value,
            })),
            sceneIndex: ctx.sceneIndex || 0,
            forceRemount: true,
            height: h,
            universalThreshold: 99,
            lowThreshold: 50,
          });
        },
        estimating: async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasComponentMinBars.mount(chartEl, {
            rows: componentRows,
            sceneIndex: ctx.sceneIndex || 0,
            countries: ["Mongolia", "Nepal"],
            forceRemount: true,
            height: h,
          });
        },
        limiting: async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasLimitingFactorsBars.mount(chartEl, {
            rows: limitingRows,
            sceneIndex: ctx.sceneIndex || 0,
            forceRemount: true,
            height: h,
          });
        },
        tanzania: async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasComponentPaths.mount(chartEl, {
            rows: tzRows,
            typicalRows,
            sceneIndex: ctx.sceneIndex || 0,
            showTypicalFromScene: 2,
            forceRemount: true,
            height: h,
          });
        },
        "ecoli-table": async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasRiskLevelTable.mount(chartEl, {
            rows: ecoliTable,
            title: "E. coli risk levels (JMP)",
          });
        },
        "ecoli-poc-pou": async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasPairedCompareBars.mount(chartEl, {
            rows: pocPouRows,
            sceneIndex: ctx.sceneIndex || 0,
            aColor: "#ecb63b",
            bColor: "#8d4117",
            aLabel: "Point of collection (PoC)",
            bLabel: "Point of use (PoU)",
            forceRemount: true,
            height: h,
          });
        },
        "ecoli-urban-rural": async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasUrbanRuralBars.mount(chartEl, {
            rows: ecoliUR,
            height: h,
            unitNote: "% with very high E. coli risk",
          });
        },
        "arsenic-grouped": async (chartEl, ctx) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasStackedShareBars.mount(chartEl, {
            rows: arsenicGroup,
            sceneIndex: ctx.sceneIndex || 0,
            views: ["urban_rural", "income"],
            forceRemount: true,
            height: h,
          });
        },
        "arsenic-source": async (chartEl) => {
          await wait2();
          const h = AtlasChapterScroll.fitChartHeight(chartEl);
          return AtlasDualThresholdBars.mount(chartEl, {
            rows: arsenicSource,
            height: h,
          });
        },
      };

      for (const b of story.blocks) {
        if (mounts[b.id]) b.mount = mounts[b.id];
      }

      window.__chapter = AtlasChapterScroll.mount(
        document.getElementById("story"),
        story
      );
    })().catch((err) => {
      console.error(err);
      document.getElementById("story").innerHTML =
        `<div style="padding:40px;color:#aa0000"><strong>Story load error</strong><pre>${err}</pre></div>`;
    });
  </script>
</body>
</html>
