<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cómo se arma un modelo cuant — Capital Trade × Unholster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/chapter-scroll.css" />
  <style>
    /* ---------- Tema Unholster sobre el motor de la librería ---------- */
    :root{
      --ch-red:#266FE0;          /* regla + rail de la anotación → azul Unholster */
      --ch-blue:#266FE0;
      --u-ink:#171B21; --u-mut:#6B7280;
    }
    body{ margin:0; background:#fff; }
    body.ch-story-page{ --ch-sticky-top:0px; }

    /* Tipografías Unholster */
    .ch-story,.ch-title,.ch-subtitle,.ch-note,.ch-note-text,.ch-prose-inner,
    .ch-hero h1,.ch-lead,.ch-byline,.ch-keyfact-value,.ch-keyfact-label{
      font-family:'Hanken Grotesk',system-ui,-apple-system,Arial,sans-serif;
    }
    .ch-kicker,.ch-scroll-cue,.ch-keyfacts-label{ font-family:'JetBrains Mono',ui-monospace,monospace; }
    .ch-title{ letter-spacing:-.02em; font-weight:800; }
    .ch-hero h1{ font-weight:800; letter-spacing:-.03em; }

    /* Acento azul (la regla usa hardcode rojo → lo reescribimos) */
    .ch-rule{ background:linear-gradient(90deg,#266FE0 0%,#266FE0 70%,rgba(38,111,224,.15) 100%); }
    .ch-note{ border-left-color:#266FE0; }
    .ch-source a{ color:#266FE0; }
    .ch-dots button.active{ background:#266FE0; }
    .ch-note-text .emphasis{ color:#184D9B; font-weight:700; }
    .ch-note-text b{ color:var(--u-ink); font-weight:700; }

    /* Hero: keyfacts en azul Unholster (no navy WB) */
    .ch-keyfact{ background:rgba(38,111,224,.16); border-color:rgba(255,255,255,.10); }
    a.ch-keyfact--link:hover{ background:rgba(38,111,224,.28); }

    /* Fondo punteado sutil (marca Unholster) en tramos de prosa */
    .ch-story{ background-image:radial-gradient(#E9ECF1 1px,transparent 1px); background-size:22px 22px; }

    /* Topbar Unholster sobre el hero oscuro */
    .ch-topbar{
      position:absolute; top:0; left:0; right:0; z-index:20;
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:12px 20px;
      font:600 12px/1.2 'JetBrains Mono',monospace; color:rgba(255,255,255,.78);
    }
    .ch-topbar .brand{ display:flex; align-items:center; gap:8px; text-transform:uppercase; letter-spacing:.12em; }
    .ch-topbar .brand .dot{ width:9px; height:9px; border-radius:50%; background:#266FE0; }
    .ch-topbar a{ color:rgba(255,255,255,.9); text-decoration:none; }

    /* Bloques de prosa a medida (intro / cierre) */
    .u-h2{ font-size:clamp(22px,3vw,28px); font-weight:800; letter-spacing:-.02em; color:var(--u-ink); margin:0 0 12px; line-height:1.15; }
    .u-endbox{ background:linear-gradient(135deg,#266FE0,#184D9B); color:#fff; border-radius:20px; padding:30px 30px; margin-top:6px; }
    .u-endbox .k{ font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.14em; font-size:11px; opacity:.85; }
    .u-endbox h3{ font-size:clamp(20px,2.6vw,26px); font-weight:800; letter-spacing:-.02em; margin:10px 0 8px; line-height:1.18; }
    .u-endbox p{ font-size:15.5px; opacity:.96; margin:6px 0; color:#fff; }
    .u-endbox .tag{ margin-top:16px; font-family:'JetBrains Mono',monospace; font-size:12px; opacity:.9; }
    .u-foot{ margin-top:22px; padding-top:16px; border-top:1px solid #E5E7EB; color:var(--u-mut); font-size:12px; line-height:1.55; }
    .u-foot b{ color:var(--u-ink); }

    /* ---------- Animaciones de los gráficos (scoped a .ct) ---------- */
    .ct .draw{ stroke-dasharray:1; stroke-dashoffset:1; }
    .ct.anim .draw{ transition:stroke-dashoffset 1.35s cubic-bezier(.4,0,.2,1); stroke-dashoffset:0; }
    .ct .grow{ transform:scaleY(0); transform-origin:bottom; transform-box:fill-box; }
    .ct.anim .grow{ transition:transform .8s cubic-bezier(.34,1.2,.4,1); transform:scaleY(1); }
    .ct .growx{ transform:scaleX(0); transform-origin:left; transform-box:fill-box; }
    .ct.anim .growx{ transition:transform 1.05s cubic-bezier(.34,1.1,.4,1); transform:scaleX(1); }
    .ct .fade{ opacity:0; transform:translateY(6px); }
    .ct.anim .fade{ transition:opacity .7s ease,transform .7s ease; opacity:1; transform:none; }
    .ct .pop{ opacity:0; transform:scale(.6); transform-origin:center; transform-box:fill-box; }
    .ct.anim .pop{ transition:opacity .5s ease,transform .6s cubic-bezier(.34,1.4,.5,1); opacity:1; transform:scale(1); }
    /* Revelados por escena */
    .ct .rev1,.ct .rev2{ opacity:0; transition:opacity .6s ease; }
    .ct[data-scene="1"] .rev1,.ct[data-scene="2"] .rev1{ opacity:1; }
    .ct[data-scene="2"] .rev2{ opacity:1; }

    /* ---------- Modo FLAT (?flat=1) para PDF / QA: sin sticky, todo apilado y en estado final ---------- */
    body.flat .ch-sticky{ position:static; height:auto; max-height:none; padding:16px 0; }
    body.flat .ch-block--scroller,body.flat .ch-block--vis{ min-height:auto !important; }
    body.flat .ch-chart{ height:430px !important; min-height:0; max-height:none; }
    body.flat .ch-hero{ min-height:auto; padding:64px 48px 48px; }
    body.flat .ch-note{ align-self:start; }
    body.flat .ch-dots{ display:none; }
    body.flat .atlas-particles-canvas{ display:none; }
    body.flat .ct .draw{ stroke-dashoffset:0 !important; }
    body.flat .ct .grow,body.flat .ct .growx{ transform:none !important; }
    body.flat .ct .fade,body.flat .ct .pop,body.flat .ct .rev1,body.flat .ct .rev2{ opacity:1 !important; transform:none !important; }
    @media print{ .ch-topbar{ display:none; } body.flat .ch-block{ break-inside:avoid; } }
  </style>
</head>
<body class="ch-story-page">
  <div class="ch-topbar">
    <div class="brand"><span class="dot"></span><span>Capital Trade × Unholster</span></div>
    <div><a href="../../gallery.html">← Librería</a></div>
  </div>

  <div id="story"></div>

  <script src="../../shared/wb-colors.js"></script>
  <script src="../../shared/svg.js"></script>
  <script src="../../shared/particles.js"></script>
  <script src="../../shared/chapter-scroll.js"></script>
  <script src="./story.js"></script>
  <script>
    (function(){
      var root = document.getElementById("story");
      var flat = /[?&]flat\b/.test(location.search);
      if (!window.CT_STORY) { root.innerHTML = '<div style="padding:40px;color:#aa0000">story.js no cargó</div>'; return; }
      var ctl = AtlasChapterScroll.mount(root, window.CT_STORY);
      window.__ct = ctl;
      if (!flat) return;
      // Modo plano: forzar montaje de cada bloque en su última escena para captura estática
      document.body.classList.add("flat");
      (async function(){
        for (var i=0;i<ctl.runtime.length;i++){
          var st = ctl.runtime[i];
          if (st.block.type === "prose") continue;
          var n = (st.block.scenes && st.block.scenes.length) || 1;
          var last = n - 1;
          try {
            var c = await st.block.mount(st.ui.chartEl, { chartEl: st.ui.chartEl, sceneIndex: last, animate:false });
            if (c && c.updateScene) c.updateScene(last, { animate:false });
          } catch(e){ console.error("flat mount", st.block.id, e); }
          var sc = st.block.scenes && st.block.scenes[last];
          if (sc && st.ui.noteText) st.ui.noteText.innerHTML = AtlasChapterScroll.formatSceneHtml(sc.text);
        }
      })();
    })();
  </script>
</body>
</html>
