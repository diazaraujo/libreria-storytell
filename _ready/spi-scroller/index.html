<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SPI Scroller — Atlas #c21 recreation</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --subtle: #6a7781;
    --line: #e8eaef;
    --wb-blue: #0071bc;
    --dark-blue: #062958;
    --LIC: #3B4DA6;
    --LMC: #DB95D7;
    --UMC: #73AF48;
    --HIC: #016B6C;
    --FCV: #1a6fb5;
    --cat8: #AA0000;
    --dim: #d5dae3;
    --font: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: var(--font); color: var(--text); background: #f4f5f7; }
  body { overflow: hidden; }

  /* Full-viewport chart + scroll drive via right strip / wheel / keys */
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    height: 100dvh;
    background: var(--bg);
  }

  header.top {
    padding: 14px 28px 6px;
    border-bottom: 1px solid transparent;
  }
  header.top h1 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 700;
  }
  header.top p {
    margin: 2px 0 0;
    font-size: 0.85rem;
    color: var(--subtle);
  }

  .stage {
    position: relative;
    min-height: 0;
    overflow: hidden;
  }
  #chart {
    position: absolute;
    inset: 0;
  }
  #chart svg { width: 100%; height: 100%; display: block; }

  .dot {
    stroke: #fff;
    stroke-width: 1;
  }
  .dot.dim { opacity: 0.22; }
  .profile-line {
    fill: none;
    stroke: #a34a3a;
    stroke-width: 1.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .profile-line-bg {
    fill: none;
    stroke: #fff;
    stroke-width: 3.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .profile-ring {
    fill: #fff;
    stroke: #a34a3a;
    stroke-width: 1.5;
  }
  .col-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    fill: var(--subtle);
  }
  .axis-tick { font-size: 11px; fill: var(--subtle); }
  .callout-name {
    font-size: 12px;
    font-weight: 700;
    fill: var(--text);
    paint-order: stroke;
    stroke: #fff;
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .callout-sub {
    font-size: 11px;
    fill: var(--subtle);
    paint-order: stroke;
    stroke: #fff;
    stroke-width: 3px;
  }
  .callout-name.accent { fill: var(--cat8); }
  .median-label {
    font-size: 11px;
    font-weight: 600;
    fill: var(--subtle);
  }
  .median-label.fcv { fill: var(--FCV); }

  /* Floating story card (Atlas style) */
  .story-card {
    position: absolute;
    left: 50%;
    bottom: 56px;
    transform: translateX(-50%);
    width: min(520px, calc(100% - 48px));
    background: rgba(255,255,255,0.96);
    border: 1px solid #e6e8ee;
    border-left: 4px solid var(--dark-blue);
    border-radius: 4px;
    box-shadow: 0 8px 28px rgba(6,41,88,0.10);
    padding: 14px 16px;
    font-size: 0.95rem;
    line-height: 1.45;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 5;
  }
  .story-card.topish {
    bottom: auto;
    top: 18%;
  }
  .story-card .scene-meta {
    font-size: 11px;
    color: var(--wb-blue);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .tag-hic { color: var(--HIC); font-weight: 700; background: color-mix(in srgb, var(--HIC) 14%, white); padding: 0 4px; border-radius: 2px; }
  .tag-lic { color: var(--LIC); font-weight: 700; background: color-mix(in srgb, var(--LIC) 14%, white); padding: 0 4px; border-radius: 2px; }
  .tag-umc { color: #448217; font-weight: 700; background: color-mix(in srgb, var(--UMC) 22%, white); padding: 0 4px; border-radius: 2px; }
  .tag-lmc { color: #a35e9f; font-weight: 700; background: color-mix(in srgb, var(--LMC) 22%, white); padding: 0 4px; border-radius: 2px; }
  .tag-cat8 { color: #fff; font-weight: 700; background: var(--cat8); padding: 0 4px; border-radius: 2px; }
  .tag-fcv { color: #fff; font-weight: 700; background: var(--dark-blue); padding: 0 4px; border-radius: 2px; }
  .emphasis { font-weight: 700; }

  footer.bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 24px 12px;
    border-top: 1px solid var(--line);
    background: #fff;
    flex-wrap: wrap;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    font-size: 12px;
    color: var(--subtle);
    justify-content: center;
    flex: 1;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .swatch {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
  }
  .source {
    font-size: 11px;
    color: var(--subtle);
    white-space: nowrap;
  }
  .source a { color: var(--wb-blue); text-decoration: none; }

  .nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav button {
    font: inherit;
    font-size: 12px;
    border: 1px solid #d0d5de;
    background: #fff;
    border-radius: 999px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text);
  }
  .nav button:hover { border-color: var(--wb-blue); color: var(--wb-blue); }
  .nav button:disabled { opacity: 0.35; cursor: default; }
  .nav .counter {
    font-size: 12px;
    color: var(--subtle);
    min-width: 48px;
    text-align: center;
  }

  .dots-progress {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 6;
  }
  .dots-progress button {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: none;
    padding: 0;
    background: #c5ccd6;
    cursor: pointer;
  }
  .dots-progress button.active { background: var(--dark-blue); transform: scale(1.25); }

  .hint {
    position: absolute;
    right: 36px;
    bottom: 72px;
    font-size: 11px;
    color: var(--subtle);
    z-index: 4;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    .story-card { bottom: 12px; font-size: 0.88rem; }
    header.top { padding: 10px 14px 4px; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>Statistical performance varies widely across economies</h1>
    <p>The SPI measures the strength of statistical systems</p>
  </header>

  <div class="stage" id="stage">
    <div id="chart"></div>
    <div class="story-card" id="story-card">
      <div class="scene-meta" id="scene-meta">Scene 1</div>
      <div id="story-text"></div>
    </div>
    <div class="dots-progress" id="progress" aria-label="Scenes"></div>
    <div class="hint">Scroll · ← → · Space</div>
  </div>

  <footer class="bar">
    <div class="source">Source: <a href="https://www.worldbank.org/en/programs/statistical-performance-indicators" target="_blank" rel="noopener">World Bank Statistical Performance Indicators</a></div>
    <div class="legend" id="legend"></div>
    <div class="nav">
      <button type="button" id="btn-prev" aria-label="Previous scene">←</button>
      <span class="counter" id="counter">1 / 9</span>
      <button type="button" id="btn-next" aria-label="Next scene">→</button>
    </div>
  </footer>
</div>

// ── Beeswarm packer ────────────────────────────────────────────────────────
class Beeswarm {
  constructor(items, radius, xFun) {
    this.items = items;
    this.diameter = radius * 2;
    this.diameterSq = this.diameter * this.diameter;
    this.xFun = xFun;
  }
  calculateYPositions() {
    const placed = this.items.map((d, originalIndex) => ({
      datum: d, originalIndex, x: this.xFun(d), y: null, placed: false,
      minPositiveY: 0, maxNegativeY: 0, score: 0, bestPosition: 0, heapPos: -1,
      tieBreaker: originalIndex,
    })).sort((a, b) => a.x - b.x);
    placed.forEach((e, i) => { e.index = i; });
    const heap = new MinHeap();
    heap.push(...placed);
    while (!heap.isEmpty()) {
      const e = heap.pop();
      e.placed = true;
      e.y = e.bestPosition;
      this._updateYBounds(e, placed, heap);
    }
    return placed
      .sort((a, b) => a.originalIndex - b.originalIndex)
      .map((e) => ({ datum: e.datum, x: e.x, y: e.y }));
  }
  _updateYBounds(t, arr, heap) {
    for (const dir of [-1, 1]) {
      for (let a = t.index + dir; a >= 0 && a < arr.length; a += dir) {
        const h = Math.abs(t.x - arr[a].x);
        if (h >= this.diameter) break;
        const r = arr[a];
        if (r.placed) continue;
        const n = Math.sqrt(this.diameterSq - h * h);
        r.minPositiveY = Math.max(r.minPositiveY, t.y + n);
        const prev = r.score;
        r.score = r.minPositiveY;
        r.bestPosition = r.minPositiveY;
        r.maxNegativeY = Math.min(r.maxNegativeY, t.y - n);
        if (-r.maxNegativeY < r.score) {
          r.score = -r.maxNegativeY;
          r.bestPosition = r.maxNegativeY;
        }
        if (r.score > prev) heap.deprioritise(r);
      }
    }
  }
}
class MinHeap {
  constructor() { this._heap = []; }
  size() { return this._heap.length; }
  isEmpty() { return this.size() === 0; }
  peek() { return this._heap[0]; }
  parent(i) { return ((i + 1) >>> 1) - 1; }
  left(i) { return (i << 1) + 1; }
  right(i) { return (i + 1) << 1; }
  push(...items) {
    items.forEach((i) => { i.heapPos = this.size(); this._heap.push(i); this._siftUp(); });
  }
  pop() {
    const top = this.peek();
    const last = this.size() - 1;
    if (last > 0) this._swap(0, last);
    this._heap.pop();
    this._siftDown();
    return top;
  }
  deprioritise(item) { this._siftDown(item.heapPos); }
  _greater(i, j) {
    const a = this._heap[i], b = this._heap[j];
    if (a.score < b.score) return true;
    if (a.score > b.score) return false;
    return a.tieBreaker < b.tieBreaker;
  }
  _swap(i, j) {
    const t = this._heap[i]; this._heap[i] = this._heap[j]; this._heap[j] = t;
    this._heap[i].heapPos = i; this._heap[j].heapPos = j;
  }
  _siftUp() {
    let i = this.size() - 1;
    while (i > 0 && this._greater(i, this.parent(i))) {
      this._swap(i, this.parent(i));
      i = this.parent(i);
    }
  }
  _siftDown(start = 0) {
    let i = start; const n = this.size();
    while (true) {
      const l = this.left(i), r = this.right(i);
      let best = i;
      if (l < n && this._greater(l, best)) best = l;
      if (r < n && this._greater(r, best)) best = r;
      if (best === i) break;
      this._swap(i, best); i = best;
    }
  }
}

function hash01(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h >>> 0) / 4294967296;
}

function yScale(v) {
  const innerH = height - margin.top - margin.bottom;
  return margin.top + (1 - v / 100) * innerH;
}

function colCenter(i, n) {
  const innerW = width - margin.left - margin.right;
  const band = innerW / n;
  return margin.left + band * i + band / 2;
}

function buildSwarms() {
  const r = Math.max(2.2, Math.min(3.8, width / 420));
  swarms = {};
  for (const col of COLS) {
    const jitter = (col.key === "pillar1" || col.key === "pillar5") ? 10 : 0;
    const packer = new Beeswarm(
      DATA,
      r,
      (d) => yScale(d[col.key]) + (jitter ? (hash01(d.iso3c + col.key) - 0.5) * jitter : 0)
    );
    const nodes = packer.calculateYPositions();
    const map = new Map();
    nodes.forEach((n) => map.set(n.datum.iso3c, n));
    swarms[col.key] = map;
  }
}

function isHighlighted(d, scene) {
  const h = scene.highlight;
  if (h === "all") return true;
  if (h.quintile != null) return d.spi_quintile === h.quintile;
  if (h.fcv != null) return d.fcv === h.fcv;
  return true;
}

function colorFor(d, scene) {
  if (scene.colorMode === "fcv") {
    return d.fcv === "fcv" ? COLORS.FCV : COLORS.dim;
  }
  return COLORS[d.income] || COLORS.dim;
}

function targetLayout(scene) {
  // returns Map(iso -> [{col, px, py, key, visible}])
  const nCols = scene.mode === "single" ? 1 : COLS.length;
  const cols = scene.mode === "single" ? [COLS[0]] : COLS;
  const out = new Map();
  DATA.forEach((d) => {
    const pts = cols.map((col, i) => {
      const node = swarms[col.key].get(d.iso3c);
      const cx = colCenter(i, nCols);
      return {
        key: col.key,
        px: cx + (node ? node.y : 0),
        py: node ? node.x : yScale(d[col.key]),
      };
    });
    out.set(d.iso3c, pts);
  });
  return out;
}

function ensureSvg() {
  if (svg) return;
  svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  chartEl.appendChild(svg);
  gAxes = el(svg, "g", { class: "axes" });
  gDots = el(svg, "g", { class: "dots" });
  gProfile = el(svg, "g", { class: "profile" });
  gMedians = el(svg, "g", { class: "medians" });
  gLabels = el(svg, "g", { class: "labels" });
}

function el(parent, tag, attrs = {}) {
  const n = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v);
  parent.appendChild(n);
  return n;
}

function clear(g) { while (g.firstChild) g.removeChild(g.firstChild); }

function drawAxes(scene) {
  clear(gAxes);
  const nCols = scene.mode === "single" ? 1 : COLS.length;
  const cols = scene.mode === "single" ? [COLS[0]] : COLS;

  for (const tick of [20, 40, 60, 80, 100]) {
    const y = yScale(tick);
    el(gAxes, "line", {
      x1: margin.left, x2: width - margin.right, y1: y, y2: y,
      stroke: "#eceef2", "stroke-width": 1,
    });
    el(gAxes, "text", {
      class: "axis-tick", x: margin.left - 8, y: y + 3, "text-anchor": "end",
    }).textContent = String(tick);
  }

  cols.forEach((col, i) => {
    el(gAxes, "text", {
      class: "col-label",
      x: colCenter(i, nCols),
      y: margin.top - 18,
      "text-anchor": "middle",
    }).textContent = col.label;
  });
}

// Persistent circle nodes keyed by iso+col so we can animate
let circleNodes = new Map(); // `${iso}|${key}` -> circle

function renderDots(scene, layout, animate) {
  const nCols = scene.mode === "single" ? 1 : COLS.length;
  const visibleKeys = new Set((scene.mode === "single" ? [COLS[0]] : COLS).map((c) => c.key));
  const r = Math.max(2.2, Math.min(3.8, width / 420));
  const duration = reduced || !animate ? 0 : 900;

  // Ensure circles exist for all iso x visible cols
  const needed = new Set();
  DATA.forEach((d) => {
    const pts = layout.get(d.iso3c);
    pts.forEach((p) => {
      const id = `${d.iso3c}|${p.key}`;
      needed.add(id);
      let c = circleNodes.get(id);
      if (!c) {
        c = el(gDots, "circle", { class: "dot", r });
        c.dataset.iso = d.iso3c;
        c.dataset.key = p.key;
        // start at SPI single column if first create mid-animation from previous
        const spiNode = swarms.spi_index.get(d.iso3c);
        const startX = colCenter(0, 1) + (spiNode ? spiNode.y : 0);
        const startY = spiNode ? spiNode.x : yScale(d.spi_index);
        c.setAttribute("cx", startX);
        c.setAttribute("cy", startY);
        circleNodes.set(id, c);
      }
      c.setAttribute("r", r);

      const hi = isHighlighted(d, scene);
      let fill = colorFor(d, scene);
      let opacity = 1;

      if (scene.colorMode === "fcv") {
        if (d.fcv !== "fcv") {
          fill = COLORS.dim;
          opacity = scene.focusColumn && p.key !== scene.focusColumn ? 0.12 : 0.28;
        } else {
          fill = COLORS.FCV;
          if (scene.focusColumn && p.key !== scene.focusColumn) opacity = 0.15;
          else opacity = 1;
        }
      } else if (!hi) {
        opacity = 0.18;
      }

      // hide pillars not in layout (single mode) by fading toward SPI x
      if (!visibleKeys.has(p.key)) {
        opacity = 0;
      }

      c.style.fill = fill;
      const fromOp = c.getAttribute("opacity");
      const fromOpacity = fromOp == null ? 1 : +fromOp;
      animateAttr(c, "cx", +c.getAttribute("cx"), p.px, duration, stagger(d, p.key));
      animateAttr(c, "cy", +c.getAttribute("cy"), p.py, duration, stagger(d, p.key));
      animateAttr(c, "opacity", fromOpacity, opacity, duration * 0.7, 0);
    });
  });

  // Remove unused circles (when going single, keep only spi_index)
  for (const [id, c] of circleNodes) {
    if (!needed.has(id)) {
      const [iso, key] = id.split("|");
      // animate toward spi then remove
      const d = DATA.find((x) => x.iso3c === iso);
      const spiNode = swarms.spi_index.get(iso);
      const tx = colCenter(0, scene.mode === "single" ? 1 : COLS.length) + (spiNode ? spiNode.y : 0);
      const ty = spiNode ? spiNode.x : yScale(d.spi_index);
      if (duration && scene.mode === "single") {
        animateAttr(c, "cx", +c.getAttribute("cx"), tx, duration, 0);
        animateAttr(c, "cy", +c.getAttribute("cy"), ty, duration, 0);
        animateAttr(c, "opacity", +(c.getAttribute("opacity") || 1), 0, duration * 0.6, 0);
        setTimeout(() => { c.remove(); circleNodes.delete(id); }, duration + 20);
      } else {
        c.remove();
        circleNodes.delete(id);
      }
    }
  }
}

function stagger(d, key) {
  // mild delay so pillars cascade like original
  const colIdx = COLS.findIndex((c) => c.key === key);
  return colIdx * 60 + hash01(d.iso3c) * 80;
}

function animateAttr(el, attr, from, to, duration, delay) {
  if (!duration || from === to) {
    el.setAttribute(attr, to);
    return;
  }
  const token = `${attr}-${Math.random()}`;
  el._anim = el._anim || {};
  el._anim[attr] = token;
  const t0 = performance.now() + delay;
  function frame(now) {
    if (el._anim[attr] !== token) return;
    if (now < t0) { requestAnimationFrame(frame); return; }
    const t = Math.min(1, (now - t0) / duration);
    // ease-in-out cubic
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    const v = from + (to - from) * e;
    el.setAttribute(attr, v);
    if (t < 1) requestAnimationFrame(frame);
    else el.setAttribute(attr, to);
  }
  requestAnimationFrame(frame);
}

function drawProfile(scene, layout) {
  clear(gProfile);
  if (!scene.profile || scene.mode === "single") return;
  const pts = layout.get(scene.profile);
  if (!pts) return;
  const d = DATA.find((x) => x.iso3c === scene.profile);
  const path = pts.map((p, i) => `${i ? "L" : "M"}${p.px},${p.py}`).join(" ");
  el(gProfile, "path", { class: "profile-line-bg", d: path });
  el(gProfile, "path", { class: "profile-line", d: path });
  pts.forEach((p) => {
    el(gProfile, "circle", {
      class: "profile-ring", cx: p.px, cy: p.py, r: Math.max(3.5, width / 380),
    });
  });
}

function drawCallouts(scene, layout) {
  clear(gLabels);
  if (!scene.callouts?.length) return;
  const colKey = "spi_index";
  const nCols = scene.mode === "single" ? 1 : COLS.length;
  scene.callouts.forEach((c) => {
    const pts = layout.get(c.iso);
    if (!pts) return;
    const p = pts.find((x) => x.key === colKey) || pts[0];
    const d = DATA.find((x) => x.iso3c === c.iso);
    const above = d.spi_index >= 55;
    const ly = above ? p.py - 16 : p.py + 18;
    el(gLabels, "text", {
      class: "callout-name" + (c.accent ? " accent" : ""),
      x: p.px, y: ly, "text-anchor": "middle",
    }).textContent = c.label;
    if (c.sub) {
      el(gLabels, "text", {
        class: "callout-sub",
        x: p.px, y: ly + 13, "text-anchor": "middle",
      }).textContent = c.sub;
    }
  });
}

function drawMedians(scene) {
  clear(gMedians);
  if (!scene.showMedians) return;
  const nCols = COLS.length;
  const i = COLS.findIndex((c) => c.key === "pillar4");
  const cx = colCenter(i, nCols);
  const half = (width - margin.left - margin.right) / nCols * 0.36;

  function med(val, label, cls) {
    const y = yScale(val);
    el(gMedians, "line", {
      x1: cx - half, x2: cx + half, y1: y, y2: y,
      stroke: "#fff", "stroke-width": 5,
    });
    el(gMedians, "line", {
      x1: cx - half, x2: cx + half, y1: y, y2: y,
      stroke: cls === "fcv" ? COLORS.FCV : "#6a7781",
      "stroke-width": 1.4,
    });
    el(gMedians, "text", {
      class: "median-label " + (cls || ""),
      x: cx + half + 6, y: y + 4, "text-anchor": "start",
    }).textContent = label;
  }
  med(NON_FCV_MEDIAN, `Median non-FCV economies: ${NON_FCV_MEDIAN}`, "");
  med(FCV_MEDIAN, `Median FCV economies: ${FCV_MEDIAN}`, "fcv");
}

function renderLegend(scene) {
  legendEl.innerHTML = "";
  const items = scene.colorMode === "fcv"
    ? [{ color: COLORS.FCV, label: "Fragile and conflict-affected economies" }]
    : [
        { color: COLORS.LIC, label: INCOME_LABELS.LIC },
        { color: COLORS.LMC, label: INCOME_LABELS.LMC },
        { color: COLORS.UMC, label: INCOME_LABELS.UMC },
        { color: COLORS.HIC, label: INCOME_LABELS.HIC },
      ];
  items.forEach((it) => {
    const s = document.createElement("span");
    s.className = "legend-item";
    s.innerHTML = `<span class="swatch" style="background:${it.color}"></span>${it.label}`;
    legendEl.appendChild(s);
  });
}

function setScene(i, animate = true) {
  sceneIndex = Math.max(0, Math.min(SCENES.length - 1, i));
  const scene = SCENES[sceneIndex];

  storyText.innerHTML = scene.html;
  sceneMeta.textContent = `${sceneIndex + 1} · ${scene.meta}`;
  storyCard.classList.toggle("topish", scene.cardPos === "topish");
  counterEl.textContent = `${sceneIndex + 1} / ${SCENES.length}`;
  btnPrev.disabled = sceneIndex === 0;
  btnNext.disabled = sceneIndex === SCENES.length - 1;
  [...progressEl.children].forEach((b, idx) => b.classList.toggle("active", idx === sceneIndex));

  drawAxes(scene);
  const layout = targetLayout(scene);
  renderDots(scene, layout, animate);
  // profile/callouts/medians after short delay so they sit on final positions
  const delay = animate && !reduced ? 450 : 0;
  setTimeout(() => {
    drawProfile(scene, layout);
    drawCallouts(scene, layout);
    drawMedians(scene);
  }, delay);
  renderLegend(scene);
}

function layout() {
  const rect = chartEl.getBoundingClientRect();
  width = Math.max(320, rect.width);
  height = Math.max(280, rect.height);
  ensureSvg();
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
  buildSwarms();
  setScene(sceneIndex, false);
}

function buildProgress() {
  progressEl.innerHTML = "";
  SCENES.forEach((s, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.title = s.meta;
    b.addEventListener("click", () => setScene(i, true));
    progressEl.appendChild(b);
  });
}

// navigation
btnPrev.addEventListener("click", () => setScene(sceneIndex - 1, true));
btnNext.addEventListener("click", () => setScene(sceneIndex + 1, true));

let wheelLock = false;
document.getElementById("stage").addEventListener("wheel", (e) => {
  if (Math.abs(e.deltaY) < 8) return;
  e.preventDefault();
  if (wheelLock) return;
  wheelLock = true;
  setScene(sceneIndex + (e.deltaY > 0 ? 1 : -1), true);
  setTimeout(() => { wheelLock = false; }, 700);
}, { passive: false });

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
    e.preventDefault(); setScene(sceneIndex + 1, true);
  } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
    e.preventDefault(); setScene(sceneIndex - 1, true);
  } else if (e.key === "Home") setScene(0, true);
  else if (e.key === "End") setScene(SCENES.length - 1, true);
});

// touch swipe
let touchY = null;
document.getElementById("stage").addEventListener("touchstart", (e) => {
  touchY = e.touches[0].clientY;
}, { passive: true });
document.getElementById("stage").addEventListener("touchend", (e) => {
  if (touchY == null) return;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dy) > 40) setScene(sceneIndex + (dy < 0 ? 1 : -1), true);
  touchY = null;
}, { passive: true });

buildProgress();
layout();
window.addEventListener("resize", () => {
  clearTimeout(window.__rz);
  window.__rz = setTimeout(layout, 120);
});
</script>
