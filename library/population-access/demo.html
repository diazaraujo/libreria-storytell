<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Library · Population Access v0.2</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f6f8; color: #111; }
    header { padding: 16px 20px; background: #fff; border-bottom: 1px solid #e5e7eb; }
    h1 { margin: 0 0 4px; font-size: 18px; }
    .sub { color: #6a7781; font-size: 13px; }
    .stage {
      height: 520px; margin: 16px; background: #fff; border-radius: 12px;
      border: 1px solid #e5e7eb; position: relative;
    }
    .nav { display: flex; gap: 8px; padding: 0 20px 16px; flex-wrap: wrap; }
    button {
      font: 600 13px system-ui; padding: 8px 12px; border-radius: 8px;
      border: 1px solid #cbd5e1; background: #fff; cursor: pointer;
    }
    button.active { background: #081079; color: #fff; border-color: #081079; }
    .story {
      margin: 0 16px 16px; padding: 14px 16px; background: #fff;
      border-radius: 8px; border-left: 4px solid #e31c3d;
      min-height: 56px; font-size: 14px; line-height: 1.45;
      transition: opacity 0.4s ease;
    }
    .links { font-size: 12px; padding: 0 20px 20px; color: #6a7781; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <header>
    <h1>AtlasLibrary.PopulationAccess <small style="color:#6a7781;font-weight:500">v0.2 · animated</small></h1>
    <p class="sub">BcrOvn12 — stack regions/countries · updateScene · opacity 2s</p>
  </header>
  <div class="nav" id="nav"></div>
  <div class="stage" id="chart"></div>
  <div class="story" id="story"></div>
  <p class="links">
    Story: <a href="../../stories/electricity-access/">electricity-access scroll</a> ·
    Chapter: <a href="../../chapters/goal_07/01-access-electricity-population/index.html?clean=1">goal_07/01</a> ·
    Origin: <a href="http://127.0.0.1:8765/en/atlas/electricity-access/">:8765</a>
  </p>
  <script src="../../shared/svg.js"></script>
  <script src="../../shared/load.js"></script>
  <script src="./population-access.js"></script>
  <script>
    const scenes = [
      { label: "0 · World pop", text: "While the global population has increased by almost 2 billion people since 2000…" },
      { label: "1 · Without", text: "… the number of people without electricity halved, falling from 1.3 billion in 2000 to 666 million in 2023." },
      { label: "2 · Regions", text: "All regions, except Sub-Saharan Africa, contributed to this rapid decline, particularly South Asia." },
      { label: "3 · SSF", text: "In 2023, Sub-Saharan Africa was home to 581 million people without electricity." },
      { label: "4 · Top 8", text: "And just eight countries account for half the world’s people who still lack access to electricity." },
      { label: "5 · Focus 3", text: "Over one-third live in Nigeria, DRC, and Ethiopia." },
    ];
    let chart = null, sceneIndex = 0;
    const nav = document.getElementById("nav");
    const story = document.getElementById("story");
    scenes.forEach((s, i) => {
      const b = document.createElement("button");
      b.textContent = s.label;
      b.onclick = () => go(i);
      nav.appendChild(b);
    });
    function go(i) {
      sceneIndex = i;
      [...nav.children].forEach((b, j) => b.classList.toggle("active", j === i));
      story.style.opacity = 0;
      setTimeout(() => {
        story.textContent = scenes[i].text;
        story.style.opacity = 1;
      }, 200);
      if (!chart) return;
      chart.updateScene(i);
    }
    (async () => {
      const base = "../../stories/electricity-access/data/";
      const [aggregates, worldPop, countries] = await Promise.all([
        AtlasLoad.csv(base + "access_electricity_population_aggregates.csv"),
        AtlasLoad.csv(base + "population_world.csv"),
        AtlasLoad.csv(base + "access_electricity_population_countries.csv"),
      ]);
      chart = AtlasPopulationAccess.mount(document.getElementById("chart"), {
        aggregates, worldPop, countries, sceneIndex: 0,
      });
      go(0);
    })();
  </script>
</body>
</html>
